# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: system
  
appearance:
  color: "sky"
theme:
    pack: "default"


# SEO
marketing:
  seo:
    site_type: organization
    local_business_type: ''
    org_name: 'T39'
    description: 'Wir sind ein selbstverwaltetes Studentenwohnheim in Aachen Zentrum, sind bekannt für die einzigartige blaue Fassade.'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    align: "center"
    fixed_to_top: true
    logo:
      text: ""
      # Logo filename in `assets/media/` folder
      filename: "T39logo.svg"
    button:
      enable: true
      text: "Internes"
      url: "internes/"
    show_search: true
    show_theme_chooser: true

# Site footer
footer:
  style: minimal
  copyright:
    notice: '© 2026 Templergraben 39 Evaganlisches Studentenwohnheim'

# Localization
locale:
  date_format: '2 Jan, 2006'
  time_format: '15:04'
