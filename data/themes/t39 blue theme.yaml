hugoblox:
  meta:
    format: hugoblox-theme@1
    name: Coffee
    vendor: hugoblox
    version: 1.0.0
    license: MIT
    description: Warm latte light mode, deep americano dark mode
  type: dual
  light:
    colors:
      primary: "#4262ff"
      secondary: "#33b1ff"
      neutral: "#78716c"
    surfaces:
      background: "#fffaf5"
      foreground: "#2f3741"
      header:
        background: "#e0eaff"
        foreground: "#13153a"
      footer:
        background: "#e0eaff"
        foreground: "#13153a"
  dark:
    colors:
      primary: "#d49255"
      secondary: "#395260"
      neutral: "#2b262b"
    surfaces:
      background: "#2b262b"
      foreground: "#e0cab6"
      header:
        background: "#2b262b"
        foreground: "#e0cab6"
      footer:
        background: "#231f23"
        foreground: "#9ca3af"
